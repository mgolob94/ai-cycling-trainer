services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cycling-ai-trainer-backend
    container_name: cycling-ai-trainer-backend
    # Inject Supabase / Strava / OpenAI secrets from the project .env file.
    env_file: .env
    # Force the in-container port to 3000 regardless of .env, so the published
    # port mapping and health check stay consistent. PORT in .env sets the
    # host-side published port.
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3000/health', r =>
          process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () =>
          process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
